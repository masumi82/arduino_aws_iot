version: "3.9"

services:
  gateway:
    image: arduino-gateway:latest
    restart: unless-stopped
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    volumes:
      - /home/masumi/arduino_aws_iot/certs:/app/certs:ro
    env_file:
      - /home/masumi/arduino_aws_iot/.env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - /home/masumi/web:/usr/share/nginx/html:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
