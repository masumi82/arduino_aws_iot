version: "3.9"

services:
  gateway:
    image: arduino-gateway:latest
    restart: unless-stopped
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    volumes:
      - /etc/arduino_iot/certs:/app/certs:ro
    env_file:
      - .env
    logging:
      driver: journald
      options:
        tag: arduino-gateway

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro
    logging:
      driver: journald
      options:
        tag: arduino-web
